    background-color: #fff;

}

}

.no-answer {
    background-color: lightgray;
}
/* Center the content */
.container {
    font-family: Arial, sans-serif;
    text-align: center;
    background-color: #f4f4f4;
    padding: 20px;
}

/* Style for the "View Certificate" button */
#certificate {
    text-decoration: none; /* Remove underline */
}

#certificate button {
    background-color: #d4af37; /* Gold color */
    color: white;
    font-size: 18px;
    font-weight: bold;
    padding: 12px 24px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
    transition: all 0.3s ease-in-out;
    box-shadow: 2px 4px 6px rgba(0, 0, 0, 0.2);
    margin-top: 20px;
}

/* Hover effect */
#certificate button:hover {
    background-color: #b8860b; /* Darker gold */
    transform: scale(1.05);
}

/* Style for the result display */
form {
    background-color: white;
    padding: 20px;
    width: 50%;
    margin: auto;
    border-radius: 10px;
    box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
    margin-top: 20px;
}

/* Style for the percentage result */
#results {
    font-size: 22px;
    font-weight: bold;
    color: #007bff; /* Blue */
}

/* Style for the division result */
#division {
    font-size: 20px;
    font-weight: bold;
    padding: 10px;
    border-radius: 5px;
    background-color: #28a745; /* Green */
    color: white;
    display: inline-block;
    margin-top: 10px;
}

/* Different colors based on performance */
.fail { background-color: #dc3545; } /* Red for Fail */
.pass-2nd { background-color: #ffc107; color: black; } /* Yellow for 2nd Division */
.pass-1st { background-color: #28a745; } /* Green for 1st Division */

/* Result box */
#result {
    font-size: 20px;
    font-weight: bold;
    color: #333;
    margin-top: 20px;
}
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-evenly;
    align-items: center;
    background: linear-gradient(135deg, #4CAF50, #2196F3); /* Gradient background */
    padding: 15px 30px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Subtle shadow for depth */
    z-index: 1000; /* Ensures the navbar stays on top of other content */
    
}

.navbar h1 {
    font-size: 28px;
    color: white;
    font-weight: bold;
}

.navbar a {
    text-decoration: none;
}

.navbar button {
 
   color: white;
    font-size: 16px;
    font-weight: 600;
    border: none;
    padding: 10px 20px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.3s ease;
    background: #6A5ACD;

}

.navbar button:hover {
    background-color: #483D8B;
    color: white;
}

.navbar a + a {
    margin-left: 20px; /* Adds space between the buttons */
}

/* Responsive design for smaller screens */
@media screen and (max-width: 768px) {
    .navbar {
        flex-direction: column;
        text-align: center;
    }

    .navbar a + a {
        margin-left: 0;
        margin-top: 10px;
    }

    .navbar button {
        width: 100%;
        margin-top: 10px;
    }
}
