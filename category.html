/* Body styles */
body {

/* Navbar styles */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(135deg, #4CAF50, #2196F3); /* Gradient background */
    padding: 15px 30px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Subtle shadow for depth */
    z-index: 1000; /* Ensures the navbar stays on top of other content */
}

.navbar h1 {
    font-size: 28px;
    color: white;
    font-weight: bold;
}

.navbar a {
    text-decoration: none;
}

.navbar button {
    background-color: #fff;
    color: #333;
    font-size: 16px;
    font-weight: 600;
    border: none;
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.navbar button:hover {
    background-color: #4CAF50;
    color: white;
}

.navbar a + a {
    margin-left: 20px; /* Adds space between the buttons */
}

/* Responsive design for smaller screens */
@media screen and (max-width: 768px) {
    .navbar {
        flex-direction: column;
        text-align: center;
    }

    .navbar a + a {
        margin-left: 0;
        margin-top: 10px;
    }

    .navbar button {
        width: 100%;
        margin-top: 10px;
    }
}
.middle{
