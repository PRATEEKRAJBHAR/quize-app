/* General Button Styling */
.edit-btn, .delete-btn, .start-link {
    width: 65px;
    height: 30px;
    border: none;
    border-radius: 8px;
    font-size: 16px;
    font-weight: bold;
    cursor: pointer;
     transition: all 0.3s ease-in-out;
    box-shadow: 0 4px 8px rgba(0, 0, 0, 0.15);

   
}

/* Edit Button (Blue) */
.edit-btn {
    /* border: 10px solid blue; */
    background: #007bff;
    color: white;

}

.edit-btn:hover {
    background: #0056b3;
    transform: translateY(-2px);
}

/* Delete Button (Red) */
.delete-btn {
    background: #dc3545;
    color: white;
}

.delete-btn:hover {
    background: #b02a37;
    transform: translateY(-2px);
}

/* Start Button (Green) */
.start-link {
    background: #28a745;
    color: white;
}

.start-link:hover {
    background: #1e7e34;
    transform: translateY(-2px);
}

/* Active Click Effect */
.edit-btn:active, .delete-btn:active, .start-link:active {
    transform: scale(0.98);
}

/* Remove button default styles inside <a> */
a {
    text-decoration: none;
}

.filter-container {
            display: flex;

            margin-top: 60px;
        }

            padding: 10px;

        }
        
/* Reset margins and paddings */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

/* Body styles */
body {
    font-family: Arial, sans-serif;
    margin-top: 60px; /* Space for the fixed navbar */
}

/* Navbar styles */
.navbar {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: linear-gradient(135deg, #4CAF50, #2196F3); /* Gradient background */
    padding: 15px 30px;
    box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1); /* Subtle shadow for depth */
    z-index: 1000; /* Ensures the navbar stays on top of other content */
}

.navbar h1 {
    font-size: 28px;
    color: white;
    font-weight: bold;
}

.navbar a {
    text-decoration: none;
}

.navbar button {
    background-color: #fff;
    color: #333;
    font-size: 16px;
    font-weight: 600;
    border: none;
    padding: 10px 20px;
    border-radius: 25px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.navbar button:hover {
    background-color: #4CAF50;
    color: white;
}

.navbar a + a {
    margin-left: 20px; /* Adds space between the buttons */
}

/* Responsive design for smaller screens */
@media screen and (max-width: 768px) {
    .navbar {
        flex-direction: column;
        text-align: center;
    }

    .navbar a + a {
        margin-left: 0;
        margin-top: 10px;
    }

    .navbar button {
        width: 100%;
        margin-top: 10px;
    }
}
